<!DOCTYPE html>
<html lang="gl">
<head>
<meta charset="UTF-8">
<title>Verín Aberto</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
    background: #F5F1E3;
    color: #050505;
  }

  .container {
    max-width: 1100px;
    margin: auto;
    padding: 40px 20px;
  }

  h1 {
    font-size: 3rem;
    margin-bottom: 10px;
  }

  .subtitle {
    color: #666;
    margin-bottom: 40px;
  }

  /* NAV ESTILO STRIPE */
  .nav {
    display: flex;
    gap: 30px;
    margin-bottom: 30px;
    border-bottom: 1px solid #DDDBCB;
  }

  .nav a {
    position: relative;
    padding-bottom: 12px;
    text-decoration: none;
    color: #666;
    font-weight: 500;
    transition: color 0.2s ease;
  }

  .nav a:hover {
    color: #050505;
  }

  /* línea animada */
  .nav a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -1px;
    width: 0%;
    height: 2px;
    background: #1B9AAA;
    transition: width 0.25s ease;
  }

  .nav a:hover::after {
    width: 100%;
  }

  .nav a.active {
    color: #050505;
  }

  .nav a.active::after {
    width: 100%;
  }

  /* DASHBOARD */
  .section-title {
    font-size: 1.8rem;
    margin: 25px 0 20px;
  }

  .dashboard {
    background: white;
    border-radius: 20px;
    border: 1px solid #DDDBCB;
    padding: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.05);
  }

  iframe {
    width: 100%;
    height: 600px;
    border: none;
    border-radius: 12px;
    transition: opacity 0.2s ease;
  }

</style>
</head>

<body>

<div class="container">

  <h1>Verín Aberto</h1>
  <div class="subtitle">Datos da comarca e do concello de Verín</div>

  <!-- NAV -->
  <div class="nav">
    <a href="#" class="active" data-target="demografia">Poboación</a>
  </div>

  <!-- TITULO -->
  <h2 class="section-title" id="titulo-dashboard">Poboación</h2>

  <!-- DASHBOARD -->
  <div class="dashboard">
    <iframe id="iframe-dashboard" src="images/dashboard_poboacion.pdf"></iframe>
  </div>

</div>

<script>
  const links = document.querySelectorAll(".nav a");
  const iframe = document.getElementById("iframe-dashboard");
  const titulo = document.getElementById("titulo-dashboard");

  const dashboards = {
    demografia: {
      src: "images/dashboard_poboacion.pdf",
      titulo: "Poboación"
    }
  };

  links.forEach(link => {
    link.addEventListener("click", e => {
      e.preventDefault();

      // activo
      links.forEach(l => l.classList.remove("active"));
      link.classList.add("active");

      const target = link.dataset.target;

      // animación
      iframe.style.opacity = 0;

      setTimeout(() => {
        iframe.src = dashboards[target].src;
        titulo.textContent = dashboards[target].titulo;
        iframe.style.opacity = 1;
      }, 150);
    });
  });
</script>

</body>
</html>
